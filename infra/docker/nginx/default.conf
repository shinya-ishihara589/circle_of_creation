server {
    listen 443 ssl;
    # 💡 ローカルテスト（127.0.0.1やlocalhost）でも動くように追記
    server_name www.squreation.com 127.0.0.1 localhost;

    ssl_certificate     /etc/letsencrypt/live/www.squreation.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.squreation.com/privkey.pem;

    root /var/www/html/public;
    index index.php index.html;

    # --- CORS 許可 ---
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;

    if ($request_method = OPTIONS) {
        return 204;
    }
    # ------------------

    # 💡【重要】ここから追記：/ws/ への通信をNode.jsコンテナ(8080)へ横流しする
    location /ws/ {
        proxy_pass http://radio-server:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 音声が途切れないようにタイムアウトを10分に延長
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # 元からある設定（location /ws/ より下に配置）
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;

        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
    }   
}
