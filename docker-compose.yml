services:
  backend:
    build: ./infra/docker/php
    container_name: backend
    volumes:
      - ./backend:/var/www/html
  radio-server:
    image: node:20-alpine
    container_name: radio-server
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    command: node radio-server.js
    # 👇 ports から expose に書き換えます
    expose:
      - "8080"
    restart: always
  nginx:
    build: ./infra/docker/nginx
    container_name: nginx
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - ./backend/:/var/www/html
      - ./infra/docker/nginx:/etc/nginx/conf.d
      - cert-data:/etc/letsencrypt
      - ./infra/docker/nginx/html:/var/www/html/cert-check
    depends_on:
      - backend
  db:
    image: mysql:8.0
    container_name: mysql
    restart: always
    volumes:
      - dbdata:/var/lib/mysql
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - cert-data:/etc/letsencrypt
      - ./infra/docker/nginx/html:/var/www/html
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12d & wait $${!}; done;'"

volumes:
  cert-data:
  dbdata:
