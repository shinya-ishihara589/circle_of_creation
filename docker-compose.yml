services:
  app:
    build: .
    volumes:
      - ./:/var/www/html
    container_name: laravel-app

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    container_name: laravel-nginx
